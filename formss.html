<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Navbar with Login Form</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>
     *{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    
    background:cornflowerblue;
}



nav{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:70px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:0 30px;
    background-color: hotpink;
}

nav h2{
    color:dodgerblue;
}

ul{
    display:flex;
    gap:25px;
    list-style:none;
}

ul a{
    text-decoration:none;
    color:chartreuse;
    font-size:18px;
}

ul a:hover{
    color:yellow;
}



.notification{
    position:relative;
    font-size:30px;
    color:white;
}

.badge{
position:absolute;
top:-8px;
right:-10px;
width:22px;
height:22px;
background:greenyellow;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:12px;
    color:black;
}



.form{
    width:300px;
    background:white;
    padding:20px;
    border-radius:10px;
    margin:120px auto;
    position:relative;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid gray;
    border-radius:5px;
}

.password{
    position:relative;
}

.icon{
    position:absolute;
    right:12px;
    top:20px;
    color:gray;
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    justify-content:center;
}

.icon .hint{
    position:absolute;
    right:24px;
    top:-6px;
    background:#333;
    color:white;
    padding:6px 8px;
    border-radius:6px;
    font-size:12px;
    white-space:nowrap;
    opacity:0;
    visibility:hidden;
    transition:0.2s ease;
    pointer-events:none;
}

.icon:hover .hint,
.icon:focus-visible .hint{
    opacity:1;
    visibility:visible;
}

small{
    color:red;
}
.cross{
    position:absolute;
    top:10px;
    right:10px;
    width:30px;
    height:30px;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    color:gray;
    z-index:1;
    border-radius:50%;
}

.cross:hover{
    background:#e0e0e0;
    color:#333;
}
</style>
</head>

<body>

<nav>

    <h2>CodeVerse</h2>

    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Courses</a></li>
    </ul>

    <div class="notification">
        <i class="fa-solid fa-bell"></i>
        <span class="badge">5</span>
    </div>

</nav>

<div class="form">

    <div class="cross"><i class="fa-solid fa-xmark"></i></div>

    <h2>Login</h2>

    <input type="email" placeholder="Enter Email">

    <div class="password">
        <input type="password"
               placeholder="Enter Password"
               minlength="8"
               required>

        <span class="icon" tabindex="0">
            <i class="fa-solid fa-heart"></i>
            <span class="hint">Minimum 8 characters required</span>
        </span>
    </div>

    
    

</div>

</body>
</html>
